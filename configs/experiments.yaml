# EventLapse Experiments Configuration
reliability_threshold_tau: 0.80
confidence_interval: 0.95

# 1. Full Event-Count x Event-Frequency Grid Sweep
expt_1_event_count_x_frequency_grid:
  enabled: true
  domains: [bounce_ball, blinking, state_machine]
  count_grid: [2, 4, 8, 12]
  frequency_grid: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0]
  metrics: [exact_match, valid_output_rate, boundary_estimate]

# 2. Frame Sampling Density Interventions (2 FPS, 10 FPS, Native Video)
expt_2_frame_density_interventions:
  enabled: true
  input_modes: [native_video, frames_2fps, frames_10fps]
  target_domains: [bounce_ball, blinking, state_machine]

# 3. Oracle Keyframe Evidence Interventions
expt_3_oracle_keyframe_evidence:
  enabled: true
  input_mode: oracle_evidence
  event_window_epsilon: 0.1 # seconds

# 4. Prompting & Reasoning Formats
expt_4_prompting_and_thinking_modes:
  enabled: true
  conditions: [direct, structured_trace, multi_turn_verification, thinking]

# 5. MORSE Trace Diagnosis & Error Taxonomy
expt_5_trace_diagnosis:
  enabled: true
  schema_mode: structured_trace
  error_categories:
    - missed_event
    - hallucinated_event
    - merged_events
    - duplicated_event
    - misordered_event
    - wrong_timestamp
    - incorrectly_accumulated_event
    - correct_trace_wrong_final_answer
    - incorrect_trace_accidental_correct
